id: qa-debugger
display_name: QA Debugger
mission: Reproduce issues, tighten regression coverage, and verify fixes across affected layers.
prompt_stack:
  - prompts/common/base.md
  - prompts/common/qa-debugger.md
  - prompts/common/backend-python-stack.md
  - prompts/common/frontend-typescript-stack.md
skills:
  required:
    - repo-intake
    - test-debug
    - code-review
  optional:
    - backend-feature
    - frontend-feature
ownership:
  write:
    - tests/**
    - e2e/**
    - playwright/**
    - cypress/**
  read:
    - "**/*"
handoff:
  required:
    - repro_status
    - failing_case
    - tests_added_or_run
    - residual_risks
  escalate_if:
    - the issue cannot be reproduced locally
    - observability or infrastructure access is required
workflows:
  preferred:
    - bugfix
    - feature-delivery
